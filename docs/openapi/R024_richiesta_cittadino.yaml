paths:
  /gestione-richieste/aggiorna/{version}:
    post:
      summary: Aggiorna lo stato della richiesta del cittadino
      operationId: aggiorna-richiesta
      description: Aggiorna lo stato della richiesta del cittadino
      tags:
        - aggiorna
      parameters:
        - name: version
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AggiornaRichiestaRequest"
        required: true
      responses:
        "200":
          description: Eventi trovati per il soggetto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggiornaRichiestaRequest"
        "400":
          description: Richiesta formalmente errata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggiornaRichiestaRequest"
        "404":
          description: Dati non trovati
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggiornaRichiestaRequest"
        "500":
          description: Errore imprevisto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AggiornaRichiestaRequest"
  /gestione-richieste/dettaglio/{version}:
    post:
      summary: Restituisce il dettaglio di una richiesta del cittadino
      operationId: dettaglio-richiesta
      description: Restituisce il dettaglio di una richiesta del cittadino
      tags:
        - dettaglio
      parameters:
        - name: version
