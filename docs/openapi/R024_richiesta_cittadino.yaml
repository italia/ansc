        required: true
      responses:
        "200":
          description: Eventi trovati per il soggetto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DettaglioRichiestaRequest"
        "400":
          description: Richiesta formalmente errata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DettaglioRichiestaRequest"
        "404":
          description: Dati non trovati
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DettaglioRichiestaRequest"
        "500":
          description: Errore imprevisto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DettaglioRichiestaRequest"
