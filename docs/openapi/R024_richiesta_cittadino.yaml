  - name: aggiorna
    description: Aggiorna stato richiesta cittadino
servers:
  - url: http://localhost:8094
    description: Servizio mock locale
  - url: https://anscservicepre.anpr.interno.it/services/service/citt
    description: Servizio di pre produzione
  - url: https://anscservice.anpr.interno.it/services/service/citt
